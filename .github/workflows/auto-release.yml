name: Auto Release on Version Bump

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  NPM_CONFIG_CACHE: ${{ runner.temp }}/.npm

jobs:
  create-release:
    name: Create Release on Version Change
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Get previous version
        id: previous_version
        run: |
          PREVIOUS_VERSION=$(git show HEAD~1:package.json 2>/dev/null | node -p "require('fs').readFileSync('/dev/stdin', 'utf-8')" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf-8')).version" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_VERSION" ]; then
            PREVIOUS_VERSION=$(git tag -l "v${{ steps.current_version.outputs.version }}" | head -1 | sed 's/v//' || echo "")
          fi
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "Previous version: $PREVIOUS_VERSION"

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          PREVIOUS="${{ steps.previous_version.outputs.previous_version }}"

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS -> $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $CURRENT"
          fi

      - name: Check if tag exists
        id: tag_check
        if: steps.version_check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${VERSION} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${VERSION} does not exist"
          fi

      - name: Extract changelog notes
        id: changelog
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"

          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG_NOTES=$(awk "/^## \\[?${VERSION}\\]?/,/^## \\[?[0-9]/" CHANGELOG.md | grep -v "^## \\[?${VERSION}\\]?" | grep -v "^## \\[?[0-9]" | sed '/^$/d' | head -50 || echo "")
          fi

          if [ -z "$CHANGELOG_NOTES" ]; then
            CHANGELOG_NOTES="Release v${VERSION}"
          fi

          {
            echo "notes<<EOF"
            echo "$CHANGELOG_NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: yarn install --frozen-lockfile

      - name: Build plugin
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: yarn build

      - name: Run tests
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: yarn test

      - name: Run linter
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: yarn lint

      - name: Verify lib directory exists
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          if [ ! -d "lib" ]; then
            echo "lib/ directory not found"
            exit 1
          fi
          test -f lib/commands/start.js
          test -f lib/commands/analyze.js
          test -f lib/commands/validate.js
          test -f lib/commands/status.js
          test -f lib/commands/resume.js
          test -f lib/commands/config.js

      - name: Verify package contents
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          PACK_OUTPUT="$(npm pack --dry-run 2>&1)"
          echo "$PACK_OUTPUT"
          echo "$PACK_OUTPUT" | grep -q "lib/commands/start.js" || {
            echo "Tarball is missing lib/commands/start.js"
            exit 1
          }
          echo "$PACK_OUTPUT" | grep -q "lib/commands/analyze.js" || {
            echo "Tarball is missing lib/commands/analyze.js"
            exit 1
          }
          echo "$PACK_OUTPUT" | grep -q "lib/commands/validate.js" || {
            echo "Tarball is missing lib/commands/validate.js"
            exit 1
          }

      - name: Publish to npm with provenance
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        if: steps.version_check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          MAX_ATTEMPTS=10
          DELAY_SECONDS=10
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i of $MAX_ATTEMPTS: verifying ${PKG_NAME}@${PKG_VERSION}"
            if npm view "${PKG_NAME}@${PKG_VERSION}" version; then
              exit 0
            fi
            sleep $DELAY_SECONDS
          done
          echo "Published package could not be verified on npm"
          exit 1

      - name: Summary
        run: |
          if [ "${{ steps.version_check.outputs.changed }}" = "true" ]; then
            if [ "${{ steps.tag_check.outputs.exists }}" = "true" ]; then
              echo "## Release Skipped" >> "$GITHUB_STEP_SUMMARY"
              echo "Tag v${{ steps.current_version.outputs.version }} already exists." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "## Release And Publish Completed" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**Version:** v${{ steps.current_version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
              echo "**Previous Version:** ${{ steps.previous_version.outputs.previous_version }}" >> "$GITHUB_STEP_SUMMARY"
              echo "**npm:** https://www.npmjs.com/package/@jterrats/smart-deployment/v/${{ steps.current_version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "## No Version Change" >> "$GITHUB_STEP_SUMMARY"
            echo "Version unchanged: ${{ steps.current_version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          fi
