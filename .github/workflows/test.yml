name: Tests

on:
  push:
    branches:
      - main
  # PR testing is handled by acceptance-criteria-validation.yml
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:only

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run integration tests
        run: yarn mocha test/integration/**/*.test.ts

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run E2E tests
        run: yarn mocha test/e2e/**/*.e2e.test.ts

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run performance tests
        run: yarn mocha test/performance/**/*.test.ts

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: test/reports/performance.json

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage
        run: yarn test:only

      - name: Check coverage threshold
        run: |
          # Check if coverage meets minimum threshold (90%)
          COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')
          THRESHOLD=90

          # Handle "Unknown" coverage (no files to cover)
          if [ "$COVERAGE" = "Unknown" ] || [ -z "$COVERAGE" ]; then
            echo "⚠️  Coverage is Unknown (no files to cover) - skipping threshold check"
            exit 0
          fi

          # Convert to number for comparison
          COVERAGE_NUM=$(echo "$COVERAGE" | sed 's/%//')

          if (( $(echo "$COVERAGE_NUM < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage $COVERAGE is below threshold $THRESHOLD%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE meets threshold $THRESHOLD%"
          fi

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));

            // Handle "Unknown" coverage
            const formatCoverage = (pct) => {
              if (pct === 'Unknown' || pct === null || pct === undefined) {
                return 'Unknown';
              }
              return typeof pct === 'number' ? pct.toFixed(2) + '%' : pct;
            };

            const linesPct = coverage.total.lines.pct;
            const linesNum = typeof linesPct === 'number' ? linesPct : 0;
            const thresholdMet = linesPct !== 'Unknown' && linesNum >= 90;

            const body = `## 📊 Test Coverage Report

            - **Lines**: ${formatCoverage(coverage.total.lines.pct)}
            - **Statements**: ${formatCoverage(coverage.total.statements.pct)}
            - **Functions**: ${formatCoverage(coverage.total.functions.pct)}
            - **Branches**: ${formatCoverage(coverage.total.branches.pct)}

            ${thresholdMet ? '✅' : '⚠️'} Coverage threshold: 90%`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
