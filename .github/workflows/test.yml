name: Tests

on:
  workflow_call:
    inputs:
      skip_coverage_check:
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
  # PR testing is handled by acceptance-criteria-validation.yml
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    uses: salesforcecli/github-workflows/.github/workflows/unitTest.yml@main

  nuts:
    needs: unit-tests
    uses: salesforcecli/github-workflows/.github/workflows/nut.yml@main
    secrets: inherit
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    with:
      os: ${{ matrix.os }}
